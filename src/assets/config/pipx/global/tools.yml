---
# Python applications installed in isolated environments by pipx.
# Each tool can specify:
#   - package: package name used by pipx metadata (required)
#   - version: pinned package version to retain (optional)
#   - install_spec: explicit pipx install target such as a git URL (optional)
#   - inject: extra packages to inject into the tool venv (optional)
#   - post_install: a binary from the tool's own venv to run after install
#       bin: executable name resolved under <venvs>/<package>/bin/
#       args: arguments passed to that executable
tools:
  - package: mlx-hub
  - package: mlx-lm
  - package: yt-dlp
  - package: huggingface-hub
  - package: openai-whisper
