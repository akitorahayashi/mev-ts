# Binary Release Workflow
#
# Delegates tagged release builds to the reusable build workflow.

name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  validate-release:
    permissions:
      contents: read
    # Pure-Node tag check with no macOS dependency, so it runs on Linux.
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Validate release tag
        run: node scripts/validate-release-version.js

  prepare-release:
    needs:
      - validate-release
    permissions:
      contents: write
    runs-on: macos-15 # Pinned deliberately; bump intentionally
    outputs:
      release_id: ${{ steps.prepare.outputs.release_id }}

    steps:
      - id: prepare
        uses: akitorahayashi/gh-release@v1
        with:
          mode: prepare
          token: ${{ github.token }}
          tag: ${{ github.ref_name }}
          create: true
          generate_notes: true

  build-and-upload:
    needs:
      - validate-release
      - prepare-release
    permissions:
      contents: read
    uses: ./.github/workflows/run-build.yml
    with:
      release_id: ${{ needs.prepare-release.outputs.release_id }}

  upload-release-assets:
    name: Upload ${{ matrix.artifact }}
    needs:
      - prepare-release
      - build-and-upload
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        artifact:
          - mev-darwin-x64
          - mev-darwin-arm64
    runs-on: macos-15 # Pinned deliberately; bump intentionally

    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: ${{ matrix.artifact }}

      - name: Upload Release Asset
        uses: akitorahayashi/gh-release@v1
        with:
          mode: upload
          token: ${{ github.token }}
          release_id: ${{ needs.prepare-release.outputs.release_id }}
          files: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256
          overwrite: true

  publish-release:
    needs:
      - prepare-release
      - upload-release-assets
    permissions:
      contents: write
    runs-on: macos-15 # Pinned deliberately; bump intentionally

    steps:
      - uses: akitorahayashi/gh-release@v1
        with:
          mode: publish
          token: ${{ github.token }}
          release_id: ${{ needs.prepare-release.outputs.release_id }}
          publish: true
