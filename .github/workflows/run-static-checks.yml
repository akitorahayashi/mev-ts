# Static Checks Workflow
#
# Runs formatting checks, Biome lint, and TypeScript typecheck.

name: Run Static Checks

on:
  workflow_call:

permissions:
  contents: read

jobs:
  run-static-checks:
    name: Run Static Checks
    runs-on: macos-15 # Pinned deliberately; bump intentionally

    steps:
      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Development Environment
        uses: ./.github/actions/setup

      - name: Run Repository Checks
        run: bun run check

      - name: Install ShellCheck
        run: brew install shellcheck

      - name: Lint Asset Shell Scripts
        run: find src/assets/config -name '*.sh' -exec shellcheck {} +
