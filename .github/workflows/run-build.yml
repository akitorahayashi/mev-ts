# Build Workflow
#
# Compiles mev into standalone executables for macOS.

name: Run Build

on:
  workflow_call:
    inputs:
      release_id:
        required: false
        type: string

jobs:
  build:
    name: Build
    if: "!startsWith(github.ref, 'refs/tags/')"
    permissions:
      contents: read
    runs-on: macos-15 # Pinned deliberately; bump intentionally

    steps:
      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Development Environment
        uses: ./.github/actions/setup

      - name: Build mev
        run: bun run build

      - name: Smoke-test the binary
        run: |
          ./dist/mev --version
          ./dist/mev list

  build-release:
    name: Build ${{ matrix.target }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-darwin-x64
            artifact: mev-darwin-x64
          - target: bun-darwin-arm64
            artifact: mev-darwin-arm64

    runs-on: macos-15 # Pinned deliberately; bump intentionally

    steps:
      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Development Environment
        uses: ./.github/actions/setup

      - name: Build mev
        run: bun scripts/build.ts --target=${{ matrix.target }} --outfile=${{ matrix.artifact }}

      - name: Smoke-test the host-native binary
        if: matrix.target == 'bun-darwin-arm64'
        run: |
          ./${{ matrix.artifact }} --version
          ./${{ matrix.artifact }} list

      - name: Checksum mev
        run: shasum -a 256 ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256

      - name: Upload Build Artifact
        if: inputs.release_id != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256

  upload-release-assets:
    name: Upload ${{ matrix.artifact }}
    if: inputs.release_id != ''
    needs:
      - build-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        artifact:
          - mev-darwin-x64
          - mev-darwin-arm64
    runs-on: macos-15 # Pinned deliberately; bump intentionally

    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: ${{ matrix.artifact }}

      - name: Upload Release Asset
        uses: akitorahayashi/gh-release@v1
        with:
          mode: upload
          token: ${{ github.token }}
          release_id: ${{ inputs.release_id }}
          files: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256
          overwrite: true
