# Build Workflow
#
# Compiles mev into standalone executables for macOS.

name: Run Build

on:
  workflow_call:
    inputs:
      release_id:
        required: false
        type: string

jobs:
  build:
    name: Build
    if: "!startsWith(github.ref, 'refs/tags/')"
    permissions:
      contents: read
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Development Environment
        uses: ./.github/actions/setup

      - name: Build mev
        run: bun run build

  build-release:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-darwin-x64
            artifact: mev-darwin-x64
          - target: bun-darwin-arm64
            artifact: mev-darwin-arm64

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Development Environment
        uses: ./.github/actions/setup

      - name: Generate Assets
        run: bun run codegen

      - name: Build mev
        run: bun build src/main.ts --compile --target=${{ matrix.target }} --outfile=${{ matrix.artifact }}

      - name: Checksum mev
        run: sha256sum ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256

      - name: Upload Release Asset
        if: inputs.release_id != ''
        uses: akitorahayashi/gh-release@v1
        with:
          mode: upload
          token: ${{ github.token }}
          release_id: ${{ inputs.release_id }}
          files: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256
          overwrite: true
